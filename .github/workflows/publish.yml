name: Publish to Modrinth

on:
  push:
    tags:
      - "v*" # Automatically trigger when you push a tag like "v1.0.0"
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g., 1.0.0 or beta-0.4)'
        required: true
        default: '1.0.0'
      version_type:
        description: 'Release Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - beta
          - alpha

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define variables
        id: vars
        run: |
          # Get the version name and remove any 'v' prefix if it exists
          VERSION="${{ github.event.inputs.version_name || github.ref_name }}"
          VERSION="${VERSION#v}"
          
          # Create the zip file name
          ZIP_NAME="Cascades-Cool-Biomes-${VERSION}.zip"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Datapack Archive
        run: zip -r "${{ env.ZIP_NAME }}" data pack.mcmeta README.md

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 56tYxv17
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ env.ZIP_NAME }}
          name: "Cascades Cool Biomes ${{ env.VERSION }}"
          version: ${{ env.VERSION }}
          version-type: ${{ github.event.inputs.version_type || 'release' }}
          loaders: datapack
          game-versions: "1.21.1" # Based on the pack.mcmeta description
