name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g., 1.0.0 or 0.4.0-beta)'
        required: true
        default: '1.0.0'
      version_type:
        description: 'Release Type'
        required: true
        default: 'beta'
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: 'Changelog for this release'
        required: false
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Define version
        run: |
          VERSION="${{ github.event.inputs.version_name || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update version in gradle.properties
        run: sed -i "s/^version=.*/version=${{ env.VERSION }}/" gradle.properties

      - name: Build all jars
        run: ./gradlew build

      - name: Create datapack zip
        run: |
          cd common/src/main/resources
          zip -r "../../../../Cascades-Cool-Biomes-${{ env.VERSION }}-datapack.zip" data pack.mcmeta pack.png
          cd ../../../..

      - name: Find Fabric jar
        run: echo "FABRIC_JAR=$(find fabric/build/libs -name '*.jar' ! -name '*-dev*' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)" >> $GITHUB_ENV

      - name: Find NeoForge jar
        run: echo "NEOFORGE_JAR=$(find neoforge/build/libs -name '*.jar' ! -name '*-dev*' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)" >> $GITHUB_ENV

      - name: Find Forge jar
        run: echo "FORGE_JAR=$(find forge/build/libs -name '*.jar' ! -name '*-dev*' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)" >> $GITHUB_ENV

      - name: Publish datapack to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 56tYxv17
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: Cascades-Cool-Biomes-${{ env.VERSION }}-datapack.zip
          name: "Cascades Cool Biomes ${{ env.VERSION }}"
          version: ${{ env.VERSION }}-datapack
          version-type: ${{ github.event.inputs.version_type || 'release' }}
          changelog: ${{ github.event.inputs.changelog }}
          loaders: datapack
          game-versions: "1.21.1"

      - name: Publish Fabric mod to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 56tYxv17
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ env.FABRIC_JAR }}
          name: "Cascades Cool Biomes ${{ env.VERSION }} (Fabric)"
          version: ${{ env.VERSION }}-fabric
          version-type: ${{ github.event.inputs.version_type || 'release' }}
          changelog: ${{ github.event.inputs.changelog }}
          loaders: fabric
          game-versions: "1.21.1"
          dependencies: |
            hybrid-beta(required)
            wwoo(optional)
            towns-and-towers(optional)

      - name: Publish NeoForge mod to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 56tYxv17
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ env.NEOFORGE_JAR }}
          name: "Cascades Cool Biomes ${{ env.VERSION }} (NeoForge)"
          version: ${{ env.VERSION }}-neoforge
          version-type: ${{ github.event.inputs.version_type || 'release' }}
          changelog: ${{ github.event.inputs.changelog }}
          loaders: neoforge
          game-versions: "1.21.1"
          dependencies: |
            hybrid-beta(required)
            wwoo(optional)
            towns-and-towers(optional)

      - name: Publish Forge mod to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 56tYxv17
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ env.FORGE_JAR }}
          name: "Cascades Cool Biomes ${{ env.VERSION }} (Forge)"
          version: ${{ env.VERSION }}-forge
          version-type: ${{ github.event.inputs.version_type || 'release' }}
          changelog: ${{ github.event.inputs.changelog }}
          loaders: forge
          game-versions: "1.21.1"
          dependencies: |
            hybrid-beta(required)
            wwoo(optional)
            towns-and-towers(optional)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Cascades Cool Biomes ${{ env.VERSION }}"
          body: ${{ github.event.inputs.changelog }}
          files: |
            Cascades-Cool-Biomes-${{ env.VERSION }}-datapack.zip
            ${{ env.FABRIC_JAR }}
            ${{ env.NEOFORGE_JAR }}
            ${{ env.FORGE_JAR }}