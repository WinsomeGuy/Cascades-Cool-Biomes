ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "mr_hybrid_beta"
type = "required"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "wwoo"
type = "optional"
versionRange = "*"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
