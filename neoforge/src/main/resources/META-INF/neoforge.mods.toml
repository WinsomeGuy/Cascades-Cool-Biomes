modLoader = "javafml" #mandatory
loaderVersion = "${neoforge_loader_version_range}" #mandatory
license = "${license}" # Review your options at https://choosealicense.com/.
issueTrackerURL = "https://github.com/WinsomeGuy/Cascades-Cool-Biomes/issues"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
displayURL = "https://modrinth.com/mod/cascades-cool-biomes"
logoFile = "pack.png"
credits = "${credits}"
authors = "${mod_author}"
